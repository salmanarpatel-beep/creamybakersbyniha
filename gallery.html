<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery | Creamy Bakers By Niha</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background:#fffaf7;
    color:#333;
}

header{
    background:#f8d7da;
    text-align:center;
    padding:25px;
}

header h1{
    color:#8b4513;
}

header p{
    margin-top:10px;
    color:#555;
}

.container{
    width:90%;
    max-width:1200px;
    margin:auto;
    padding:50px 0;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

.card{
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.card h3{
    padding:15px;
    text-align:center;
    color:#d63384;
}

.home-btn{
    display:inline-block;
    margin-top:40px;
    background:#d63384;
    color:white;
    text-decoration:none;
    padding:15px 25px;
    border-radius:8px;
}

.home-section{
    text-align:center;
}

footer{
    background:#8b4513;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:50px;
}
</style>
</head>

<body>

<header>
    <h1>Creamy Bakers By Niha</h1>
    <p>Our Cake Gallery</p>
</header>

<div class="container">

    <div class="gallery">

        <div class="card">
            <img src="images/image.png" alt="Birthday Cake">
            <h3>Birthday Cake</h3>
        </div>

        <div class="card">
            <img src="images/cake2.jpg" alt="Chocolate Cake">
            <h3>Chocolate Cake</h3>
        </div>

        <div class="card">
            <img src="images/cake3.jpg" alt="Cupcakes">
            <h3>Cupcakes</h3>
        </div>

        <div class="card">
            <img src="images/cake4.jpg" alt="Brownies">
            <h3>Brownies</h3>
        </div>

        <div class="card">
            <img src="images/cake5.jpg" alt="Cookies">
            <h3>Cookies</h3>
        </div>

        <div class="card">
            <img src="images/cake6.jpg" alt="Custom Cake">
            <h3>Custom Cake</h3>
        </div>

    </div>

    <div class="home-section">
        <a href="index.html" class="home-btn">
            ← Back to Home
        </a>
    </div>

</div>

<footer>
    © 2026 Creamy Bakers By Niha
</footer>

</body>
</html>
